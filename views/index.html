<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS only -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
    <!-- JavaScript Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW"
        crossorigin="anonymous"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/public/style.css">

    <title>Vocabulaire</title>
</head>

<body>


    <div class="container" id="app">
        <section id="menu-principal" class="d-flex justify-content-center align-items-center flex-column"
            style="height: 100vh;">
            <h1 class="text-center my-3 w-100">Vocabulary</h1>
            <ul class="list-group w-100">
                <li class="list-unstyled item-menu-principal text-center my-2 py-2" type="button" data-bs-toggle="modal"
                    data-bs-target="#modal-add-word">Add a new word</li>
                <li class="list-unstyled item-menu-principal text-center my-2 py-2">Revision</li>
                <li class="list-unstyled item-menu-principal text-center my-2 py-2">Word list</li>
                <li class="list-unstyled item-menu-principal text-center my-2 py-2">
                    <a href="/?deconnexion=true" style="color: inherit; text-decoration: none; display: block;">
                        Disconnection
                    </a>
                </li>

            </ul>
        </section>

        <div class="modal fade" data-bs-backdrop="static" data-bs-keyboard="false" id="modal-add-word"
            aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 class="modal-title fs-2 text-center" id="title-modal-add-word">Add a new word</h3>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="text" class="form-control" placeholder="Enter a word in English">
                        <br>
                        <input type="text" class="form-control" placeholder="Enter a word in French">
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary fs-5" data-bs-dismiss="modal">Close</button>
                        <button class="btn btn-primary fs-5">Add word</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
