<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS only -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
    <!-- JavaScript Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW"
        crossorigin="anonymous"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: hsl(179, 90%, 33%);
            font-family: 'Fredoka One', cursive;
        }

        h1 {
            color: #F18F01;
        }

        #button-connexion {
            background-color: #242325;
        }

        #div-principal {
            height: 100vh;
        }

        form {
            width: 500px;
        }

        @media (max-width: 510px) {
            form {
                width: 100%;
            }
        }
    </style>

    <title>Connexion Vocabulaire</title>
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center flex-column" id="div-principal">
        <h1 class="text-center text-white">Vocabulary</h1>
        <form action="/" method="POST">
            <input type="password" name="motDePasse" class="form-control my-3 text-center fs-3"
                placeholder="Enter password !">
            <input type="submit" class="btn w-100 text-white fs-2" value="Connexion" id="button-connexion">
        </form>
    </div>

</body>

</html>
